<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Růžový Blackjack 21</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Over/Under 21</h1>
    </header>
    <main>
        <div class="back-link-container">
            <a href="index.html" class="back-link">&lt; Zpět na úvod</a>
        </div>
        
        <div class="casino-container">
            
            <p class="rules">Dostaň se blíž k 21 než dealer, ale nesmíš přetáhnout!<br>
            Karty jsou 1-10. Dealer hraje do 17.</p>

            <div class="area">
                <h3>Karty Dealera</h3>
                <div id="dealer-cards" class="cards">-</div>
                <div id="dealer-score" class="score">Skóre: 0</div>
            </div>

            <div class="area">
                <h3>Moje Karty</h3>
                <div id="player-cards" class="cards">-</div>
                <div id="player-score" class="score">Skóre: 0</div>
            </div>

            <div id="message">Klikni na "Start hry" a začni hrát!</div>

            <div id="score-counter">Balance: 0</div>

            <div class="controls" id="game-controls" style="display: none;">
                <button onclick="hit()">Další kartu (Hit)</button>
                <button onclick="stand()">Stačí (Stand)</button>
            </div>

            <div class="controls" id="start-controls">
                <button onclick="startGame()">Start hry</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
