<!DOCTYPE html>
<html lang="en">
<head>

    <title>Online Casino - Hod Mincí</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hod Mincí</h1>
    </header>
    <main>
        <div class="back-link-container">
            <a href="index.html" class="back-link">&lt; Zpět na úvod</a>
        </div>
        
        <div class="casino-container">
            <!-- Zobrazení mince -->

            <div class="controls">
                <p>Balance: $<span id="balance">100</span></p>

                    <button onclick="flip('Panna')">HODIT PANNA 👩 ($10)</button>
                    <button onclick="flip('Orel')">HODIT OREL 🦅 ($10)</button>
                </div>
            </div>
            
            <h2 id="message">Vyber si stranu a zkus své štěstí!</h2>
        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
